name: Daily West End Seat Availability Scrape

on:
  schedule:
    # Runs daily at 02:00 UTC (= 03:00 BST during British Summer Time).
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI.

permissions:
  contents: write  # Needed to commit the updated database back to the repo.

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          LTD_API_KEY: ${{ secrets.LTD_API_KEY }}
        working-directory: scraper
        run: python scraper.py

      - name: Commit updated database
        working-directory: scraper
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/availability.db
          git diff --staged --quiet || git commit -m "chore: daily availability snapshot $(date -u +%Y-%m-%d)"
          git push
